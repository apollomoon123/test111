<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 电动交通图标：汽车 + 闪电充电 -->
  <!-- 道路 -->
  <path d="M15 95 L105 95" stroke="#00e5ff" stroke-width="2" opacity="0.4" stroke-dasharray="6 4"/>
  <!-- 汽车车身 -->
  <path d="M25 75 L30 60 L50 55 L75 55 L85 65 L95 70 L95 80 L25 80 Z" stroke="#00e5ff" stroke-width="2.5" fill="rgba(0,229,255,0.05)" stroke-linejoin="round"/>
  <!-- 车窗 -->
  <path d="M38 62 L50 58 L70 58 L78 66 L38 66 Z" stroke="#0080ff" stroke-width="1.5" fill="rgba(0,128,255,0.1)"/>
  <!-- 车轮 -->
  <circle cx="38" cy="82" r="7" stroke="#00e5ff" stroke-width="2" fill="rgba(10,14,26,0.8)"/>
  <circle cx="82" cy="82" r="7" stroke="#00e5ff" stroke-width="2" fill="rgba(10,14,26,0.8)"/>
  <circle cx="38" cy="82" r="3" fill="#00e5ff" opacity="0.6"/>
  <circle cx="82" cy="82" r="3" fill="#00e5ff" opacity="0.6"/>
  <!-- 充电闪电符号 -->
  <path d="M60 20 L52 38 L60 38 L54 52 L68 32 L60 32 L66 20 Z" fill="#00e5ff" opacity="0.9" stroke="#00e5ff" stroke-width="1"/>
  <!-- 能量充入线条 -->
  <line x1="60" y1="52" x2="60" y2="55" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
</svg>
