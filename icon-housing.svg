<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 智能家居图标：房屋 + 太阳能板 + 电路 -->
  <!-- 屋顶 -->
  <path d="M25 50 L60 25 L95 50" stroke="#00e5ff" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- 屋顶太阳能板纹理 -->
  <line x1="35" y1="42" x2="50" y2="32" stroke="#0080ff" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="49" x2="60" y2="39" stroke="#0080ff" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="39" x2="85" y2="49" stroke="#0080ff" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="32" x2="75" y2="42" stroke="#0080ff" stroke-width="1" opacity="0.5"/>
  <!-- 房屋主体 -->
  <path d="M32 50 L32 95 L88 95 L88 50" stroke="#00e5ff" stroke-width="2.5" fill="rgba(0,229,255,0.05)" stroke-linejoin="round"/>
  <!-- 门 -->
  <rect x="52" y="72" width="16" height="23" stroke="#0080ff" stroke-width="2" fill="none" rx="1"/>
  <!-- 窗户（发光） -->
  <rect x="40" y="60" width="12" height="12" stroke="#00e5ff" stroke-width="1.5" fill="rgba(0,229,255,0.15)" rx="1"/>
  <rect x="68" y="60" width="12" height="12" stroke="#00e5ff" stroke-width="1.5" fill="rgba(0,229,255,0.15)" rx="1"/>
  <!-- 底部能量线 -->
  <line x1="20" y1="95" x2="100" y2="95" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <circle cx="20" cy="95" r="2" fill="#00e5ff" opacity="0.8"/>
  <circle cx="100" cy="95" r="2" fill="#00e5ff" opacity="0.8"/>
</svg>
